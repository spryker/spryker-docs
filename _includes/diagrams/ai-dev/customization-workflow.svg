<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>

  <!-- ===== LEGEND (top-center, away from Idea) ===== -->
  <rect x="180" y="6" width="60" height="18" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="210" y="19" font-size="10" fill="#111" text-anchor="middle">skill</text>
  <rect x="250" y="6" width="60" height="18" rx="3" fill="#FFC247" stroke="#222" stroke-width="1"/>
  <text x="280" y="19" font-size="10" fill="#111" text-anchor="middle">agent</text>

  <!-- ===== PHASE ROW (y 40-100) ===== -->

  <!-- Idea start (oversized — the headline input) -->
  <rect x="0" y="35" width="100" height="80" rx="40" fill="#FFE680" stroke="#222" stroke-width="1.5"/>
  <text x="50" y="83" font-size="22" font-weight="700" fill="#111" text-anchor="middle">Idea</text>

  <!-- Plan -->
  <rect x="125" y="40" width="170" height="70" rx="3" fill="#FFE680" stroke="#222" stroke-width="1"/>
  <text x="210" y="82" font-size="20" font-weight="700" fill="#111" text-anchor="middle">Plan</text>

  <!-- Build -->
  <rect x="320" y="40" width="170" height="70" rx="3" fill="#FFE680" stroke="#222" stroke-width="1"/>
  <text x="405" y="82" font-size="20" font-weight="700" fill="#111" text-anchor="middle">Build</text>

  <!-- Refresh -->
  <rect x="515" y="40" width="170" height="70" rx="3" fill="#FFE680" stroke="#222" stroke-width="1"/>
  <text x="600" y="82" font-size="20" font-weight="700" fill="#111" text-anchor="middle">Refresh</text>

  <!-- Verify -->
  <rect x="710" y="40" width="170" height="70" rx="3" fill="#FFE680" stroke="#222" stroke-width="1"/>
  <text x="795" y="82" font-size="20" font-weight="700" fill="#111" text-anchor="middle">Verify</text>

  <!-- Review -->
  <rect x="905" y="40" width="170" height="70" rx="3" fill="#FFE680" stroke="#222" stroke-width="1"/>
  <text x="990" y="82" font-size="20" font-weight="700" fill="#111" text-anchor="middle">Review</text>

  <!-- Working feature (oversized — the headline output) -->
  <rect x="1110" y="35" width="180" height="80" rx="40" fill="#FFE680" stroke="#222" stroke-width="1.5"/>
  <text x="1200" y="83" font-size="20" font-weight="700" fill="#111" text-anchor="middle">Working feature</text>

  <!-- Phase arrows -->
  <line x1="100"  y1="75" x2="122"  y2="75" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="295"  y1="75" x2="317"  y2="75" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="490"  y1="75" x2="512"  y2="75" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="685"  y1="75" x2="707"  y2="75" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="880"  y1="75" x2="902"  y2="75" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="1075" y1="75" x2="1107" y2="75" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Connector lines from phase to skill chain -->
  <line x1="210" y1="110" x2="210" y2="128" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="405" y1="110" x2="405" y2="128" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="600" y1="110" x2="600" y2="128" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="795" y1="110" x2="795" y2="128" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="990" y1="110" x2="990" y2="128" stroke="#222" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ===== SKILL/AGENT items: skill = pale #FFF5CC ; agent = bright #FFC247 ; same shape, same border ===== -->

  <!-- Plan items -->
  <rect x="125" y="130" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="210" y="148" font-size="11" fill="#111" text-anchor="middle">product-requirement-document</text>
  <rect x="125" y="163" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="210" y="181" font-size="11" fill="#111" text-anchor="middle">spryker-docs-research</text>
  <rect x="125" y="196" width="170" height="28" rx="3" fill="#FFC247" stroke="#222" stroke-width="1"/>
  <text x="210" y="214" font-size="11" font-weight="600" fill="#111" text-anchor="middle">spryker-feature-expert</text>

  <!-- Build items -->
  <rect x="320" y="130" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="405" y="148" font-size="11" fill="#111" text-anchor="middle">yves-atomic-frontend</text>
  <rect x="320" y="163" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="405" y="181" font-size="11" fill="#111" text-anchor="middle">codecept-functional</text>
  <rect x="320" y="196" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="405" y="214" font-size="11" fill="#111" text-anchor="middle">ai-runtime-debugging</text>
  <rect x="320" y="229" width="170" height="28" rx="3" fill="#FFC247" stroke="#222" stroke-width="1"/>
  <text x="405" y="247" font-size="11" font-weight="600" fill="#111" text-anchor="middle">spryker-data-seeder</text>

  <!-- Refresh items -->
  <rect x="515" y="130" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="600" y="148" font-size="11" fill="#111" text-anchor="middle">spryker-refresher</text>

  <!-- Verify items -->
  <rect x="710" y="130" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="795" y="148" font-size="11" fill="#111" text-anchor="middle">spryker-qa-coverage</text>
  <rect x="710" y="163" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="795" y="181" font-size="11" fill="#111" text-anchor="middle">spryker-runtime</text>
  <rect x="710" y="196" width="170" height="28" rx="3" fill="#FFC247" stroke="#222" stroke-width="1"/>
  <text x="795" y="214" font-size="11" font-weight="600" fill="#111" text-anchor="middle">spryker-verifier</text>
  <rect x="710" y="229" width="170" height="28" rx="3" fill="#FFC247" stroke="#222" stroke-width="1"/>
  <text x="795" y="247" font-size="11" font-weight="600" fill="#111" text-anchor="middle">spryker-issue-diagnoser</text>

  <!-- Review items -->
  <rect x="905" y="130" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="990" y="148" font-size="11" fill="#111" text-anchor="middle">static-validation</text>
  <rect x="905" y="163" width="170" height="28" rx="3" fill="#FFF5CC" stroke="#222" stroke-width="1"/>
  <text x="990" y="181" font-size="11" fill="#111" text-anchor="middle">code-review</text>
  <rect x="905" y="196" width="170" height="28" rx="3" fill="#FFC247" stroke="#222" stroke-width="1"/>
  <text x="990" y="214" font-size="11" font-weight="600" fill="#111" text-anchor="middle">spryker-code-reviewer</text>
  <rect x="905" y="229" width="170" height="28" rx="3" fill="#FFC247" stroke="#222" stroke-width="1"/>
  <text x="990" y="247" font-size="11" font-weight="600" fill="#111" text-anchor="middle">spryker-screenshot-collector</text>
</svg>
