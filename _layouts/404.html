<div class="page-content error-section">
    <div class="container">
        <h1 class="error-section__title">Page not found</h1>
        <p class="error-section__text">The page you're looking for does not exist.</p>
        <a href="/" class="error-section__button button button--red">Go to Home page</a>
    </div>
</div>
<script>
dataLayer.push({
  event: "error_404",
  page_path: window.location.pathname,
  page_location: window.location.href,
  page_referrer: document.referrer
});
</script>
